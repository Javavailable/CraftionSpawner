name: CraftionSpawner
provides: [ SmartSpawner ]
version: '${version}'
main: github.nighter.smartspawner.SmartSpawner
api-version: '1.21'
authors: [ https://github.com/OpenVdra/SmartSpawner, Javavailable ]
website: "https://github.com/Javavailable/CraftionSpawner"
description: "CraftionSpawner spawner management and integration fork"
folia-supported: true
softdepend:
  # Bedrock Support Plugins
  - floodgate
  - Geyser-Spigot

  # Shop Plugins
  - EconomyShopGUI
  - EconomyShopGUI-Premium
  - ShopGUIPlus
  - zShop

  # Utility/Economy Plugins
  - ExcellentEconomy
  - Vault

  # Protection/Region Plugins
  - WorldGuard
  - GriefPrevention
  - Lands
  - Towny
  - SimpleClaimSystem
  - minePlots
  - PlotSquared
  - Residence

  # World Management Plugins
  - Multiverse-Core
  - MultiWorld
  - Worlds
  - SuperiorSkyblock2
  - BentoBox
  - IridiumSkyblock
  - Skyllia

  # RPG/Skill Plugins
  - AuraSkills

  #Drops Plugins
  - MythicMobs

commands:
  craftionspawner:
    description: Main command for CraftionSpawner plugin
    usage: /craftionspawner [reload|give|list|hologram|prices|clear|near|set|language|gui_layout] [args...]
    aliases: [ cspawner, spawner, smartspawner, ss ]
    permission: smartspawner.command.use
    permission-message: "ʙᴜ ᴋᴏᴍᴜᴛ ɪᴄɪɴ ʏᴇᴛᴋɪɴ ʏᴏᴋ"

permissions:
  # Main command permission
  smartspawner.command.use:
    description: Allow access to CraftionSpawner commands
    default: op

  # Subcommand permissions
  smartspawner.command.reload:
    description: Permission to reload CraftionSpawner plugin
    default: op

  smartspawner.command.give:
    description: Allow giving spawners to yourself
    default: op

  smartspawner.command.list:
    description: Allow viewing list of spawners and teleporting to them
    default: op

  smartspawner.command.hologram:
    description: Allow toggling hologram for spawners
    default: op

  smartspawner.command.prices:
    description: Allow viewing sell prices of spawner items
    default: op

  smartspawner.command.clear:
    description: Allow clearing holograms and ghost spawners
    default: op

  smartspawner.command.near:
    description: Allow highlighting nearby spawners through walls
    default: op

  smartspawner.command.set:
    description: Allow setting CraftionSpawner stack size, range, and delay
    default: op

  smartspawner.command.language:
    description: Allow changing the active CraftionSpawner language
    default: op

  smartspawner.command.gui_layout:
    description: Allow changing the active CraftionSpawner GUI layout
    default: op

  # Feature permissions
  smartspawner.changetype:
    description: Allow changing spawner type with spawn egg
    default: op

  smartspawner.stack:
    description: Allow stacking spawners
    default: true

  smartspawner.break:
    description: Allow breaking spawners
    default: true

  smartspawner.break.bypassdropchance:
    description: Bypass spawner drop chance and always receive spawner drops
    default: op

  smartspawner.sellall:
    description: "Allow selling items in spawner storage GUI"
    default: true

  smartspawner.bypass.skyllia:
    description: "Bypass CraftionSpawner Skyllia protection checks"
    default: op
